name: Build

on:
  push:
  pull_request:

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      project_changed: ${{ steps.filter.outputs.project_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant files
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.before }}"
          fi

          head_ref="${{ github.sha }}"
          project_changed=false

          if [[ "$base_ref" =~ ^0+$ ]] || ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
            echo "project_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              AGENTS.md|CLAUDE.md|docs/*|.planning/*)
                ;;
              *)
                project_changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base_ref" "$head_ref")

          echo "project_changed=$project_changed" >> "$GITHUB_OUTPUT"

  compile:
    name: ${{ matrix.task_name }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.project_changed == 'true'
    concurrency:
      group: build-${{ github.ref }}-${{ matrix.task_name }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - task_name: aui-core compile
            gradle_task: :aui-core:compileDebugKotlin
          - task_name: aui-compose compile
            gradle_task: :aui-compose:compileDebugKotlin
          - task_name: demo kotlin compile
            gradle_task: :demo:compileDebugKotlin
          - task_name: demo resource compile
            gradle_task: :demo:assembleDebug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run compile check
        run: ./gradlew ${{ matrix.gradle_task }} --stacktrace
