name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: unit-tests-${{ github.ref }}-${{ matrix.module || 'all' }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.module }} unit tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [aui-core, aui-compose]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :${{ matrix.module }}:testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-unit-test-reports
          path: |
            ${{ matrix.module }}/build/reports/tests/
            ${{ matrix.module }}/build/test-results/
          if-no-files-found: ignore
          retention-days: 14
